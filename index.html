<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no" />
  <title>FaceEmoji</title>
  <meta name="description" content="צלם את הפרצוף שלך וקבל אימוגי מתאים!" />

  <!-- PWA -->
  <link rel="manifest" href="/manifest.json" />
  <meta name="theme-color" content="#0a0a0a" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="FaceEmoji" />
  <link rel="apple-touch-icon" href="/icons/icon-192.png" />

  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #0a0a0a;
      color: white;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow: hidden;
    }

    #app {
      width: 100%;
      max-width: 430px;
      min-height: 100dvh;
      display: flex;
      flex-direction: column;
    }

    /* Header */
    #header {
      padding: 16px 20px 10px;
      padding-top: calc(16px + env(safe-area-inset-top));
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #logo { font-size: 22px; font-weight: 700; letter-spacing: -0.5px; }
    #logo span { opacity: 0.4; font-weight: 400; font-size: 14px; margin-right: 8px; }

    /* Camera */
    #camera-section {
      flex: 1;
      position: relative;
      overflow: hidden;
      background: #111;
    }

    #video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transform: scaleX(-1);
      display: block;
    }

    #canvas { display: none; }

    #face-guide {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      pointer-events: none;
    }

    #face-oval {
      width: 200px;
      height: 260px;
      border: 2.5px solid rgba(255,255,255,0.35);
      border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
    }

    /* Big emoji overlay */
    #big-emoji {
      position: absolute;
      top: 16px;
      left: 50%;
      transform: translateX(-50%) scale(0);
      font-size: 72px;
      line-height: 1;
      transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      filter: drop-shadow(0 4px 16px rgba(0,0,0,0.6));
      pointer-events: none;
    }
    #big-emoji.show { transform: translateX(-50%) scale(1); }

    /* Hint text */
    #hint {
      position: absolute;
      bottom: 16px;
      left: 0; right: 0;
      text-align: center;
      font-size: 13px;
      color: rgba(255,255,255,0.45);
      pointer-events: none;
    }

    /* No camera state */
    #no-cam {
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 16px;
      height: 100%;
      color: rgba(255,255,255,0.4);
      font-size: 15px;
      text-align: center;
      padding: 40px;
    }
    #no-cam .cam-icon { font-size: 60px; opacity: 0.2; }
    #allow-btn {
      padding: 12px 28px;
      background: white;
      color: #000;
      border: none;
      border-radius: 40px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
    }

    /* Bottom panel */
    #bottom {
      background: #111;
      padding: 16px 20px;
      padding-bottom: calc(16px + env(safe-area-inset-bottom));
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 14px;
    }

    /* Emoji results strip */
    #emoji-strip {
      display: flex;
      gap: 8px;
      flex-wrap: wrap;
      justify-content: center;
      min-height: 48px;
      align-items: center;
      width: 100%;
    }

    .emoji-pill {
      background: #1e1e1e;
      border: 1px solid #2a2a2a;
      border-radius: 50px;
      padding: 8px 16px;
      font-size: 20px;
      cursor: pointer;
      transition: transform 0.15s, background 0.15s;
      display: flex;
      align-items: center;
      gap: 6px;
      color: white;
    }
    .emoji-pill:active { transform: scale(0.93); background: #252525; }
    .emoji-pill .pill-tag { font-size: 11px; color: rgba(255,255,255,0.35); }
    .emoji-pill.copied { border-color: #2d5a2d; background: #152315; }

    #status {
      font-size: 13px;
      color: rgba(255,255,255,0.4);
      min-height: 18px;
      text-align: center;
    }

    /* Snap button */
    #snap-wrap {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    #snap-btn {
      width: 76px;
      height: 76px;
      border-radius: 50%;
      background: white;
      border: 5px solid #333;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 30px;
      transition: transform 0.15s, background 0.15s;
      outline: none;
      position: relative;
      -webkit-tap-highlight-color: transparent;
    }
    #snap-btn:active { transform: scale(0.93); background: #ddd; }
    #snap-btn.loading { background: #1a1a1a; pointer-events: none; border-color: #222; }

    #spinner {
      display: none;
      width: 30px; height: 30px;
      border: 3px solid #333;
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Install hint */
    #install-hint {
      font-size: 11px;
      color: rgba(255,255,255,0.2);
      text-align: center;
    }

    /* Pulse animation on first load */
    @keyframes pulse {
      0%, 100% { border-color: rgba(255,255,255,0.35); }
      50% { border-color: rgba(255,255,255,0.7); }
    }
    #face-oval.pulse { animation: pulse 2s ease-in-out infinite; }
  </style>
</head>
<body>
<div id="app">
  <div id="header">
    <div id="logo">FaceEmoji <span>זיהוי הבעות</span></div>
  </div>

  <div id="camera-section">
    <video id="video" autoplay playsinline muted></video>
    <canvas id="canvas"></canvas>

    <div id="face-guide">
      <div id="face-oval" class="pulse"></div>
    </div>

    <div id="big-emoji"></div>
    <div id="hint">כוון את הפנים לעיגול</div>

    <div id="no-cam">
      <div class="cam-icon">📷</div>
      <div>נדרשת גישה למצלמה</div>
      <button id="allow-btn" onclick="startCamera()">אפשר גישה</button>
    </div>
  </div>

  <div id="bottom">
    <div id="emoji-strip">
      <span style="font-size:13px;color:rgba(255,255,255,0.25);">לחץ על 📸 לזיהוי הבעה</span>
    </div>
    <div id="status"></div>
    <div id="snap-wrap">
      <button id="snap-btn" onclick="snap()" aria-label="צלם והזהה">
        <span id="snap-icon">📸</span>
        <div id="spinner"></div>
      </button>
    </div>
    <div id="install-hint">Safari → שתף → הוסף למסך הבית להתקנה</div>
  </div>
</div>

<script>
const video    = document.getElementById('video');
const canvas   = document.getElementById('canvas');
const bigEmoji = document.getElementById('big-emoji');
const status   = document.getElementById('status');
const strip    = document.getElementById('emoji-strip');
const snapBtn  = document.getElementById('snap-btn');
const snapIcon = document.getElementById('snap-icon');
const spinner  = document.getElementById('spinner');
const noCam    = document.getElementById('no-cam');
const hint     = document.getElementById('hint');
const oval     = document.getElementById('face-oval');

let stream = null;
let busy   = false;

async function startCamera() {
  try {
    stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: 'user', width: { ideal: 640 }, height: { ideal: 480 } },
      audio: false
    });
    video.srcObject = stream;
    video.style.display = 'block';
    noCam.style.display = 'none';
    hint.style.display = 'block';
  } catch {
    video.style.display = 'none';
    noCam.style.display = 'flex';
    hint.style.display = 'none';
  }
}

function captureBase64() {
  const w = video.videoWidth  || 640;
  const h = video.videoHeight || 480;
  canvas.width = w; canvas.height = h;
  const ctx = canvas.getContext('2d');
  ctx.translate(w, 0); ctx.scale(-1, 1);
  ctx.drawImage(video, 0, 0, w, h);
  return canvas.toDataURL('image/jpeg', 0.8).split(',')[1];
}

function setLoading(on) {
  busy = on;
  snapBtn.classList.toggle('loading', on);
  snapIcon.style.display = on ? 'none' : 'block';
  spinner.style.display  = on ? 'block' : 'none';
  snapBtn.disabled = on;
}

function showBig(em) {
  bigEmoji.textContent = em;
  bigEmoji.classList.remove('show');
  void bigEmoji.offsetWidth;
  bigEmoji.classList.add('show');
  oval.classList.remove('pulse');
}

function buildStrip(emojis, labels) {
  strip.innerHTML = '';
  emojis.forEach((em, i) => {
    const btn = document.createElement('button');
    btn.className = 'emoji-pill';
    btn.setAttribute('aria-label', `העתק ${em}`);
    btn.innerHTML = `<span>${em}</span><span class="pill-tag">${labels[i] || ''}</span>`;
    btn.onclick = () => {
      navigator.clipboard.writeText(em).catch(() => {});
      const orig = btn.innerHTML;
      btn.classList.add('copied');
      btn.innerHTML = `<span>${em}</span><span class="pill-tag">✓ הועתק</span>`;
      setTimeout(() => { btn.classList.remove('copied'); btn.innerHTML = orig; }, 1600);
    };
    strip.appendChild(btn);
  });
}

async function snap() {
  if (busy) return;
  if (!stream) { startCamera(); return; }

  setLoading(true);
  status.textContent = 'מנתח הבעת פנים...';
  bigEmoji.classList.remove('show');

  try {
    const imageData = captureBase64();

    const res = await fetch('/api/detect', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ image: imageData })
    });

    if (!res.ok) throw new Error('Server error');
    const result = await res.json();

    showBig(result.main || '😐');
    buildStrip(result.emojis || [result.main], result.labels || []);
    status.textContent = result.expression ? `זוהה: ${result.expression}` : '';

  } catch {
    status.textContent = 'שגיאה — נסה שוב';
    buildStrip(['😶'], ['נסה שוב']);
  }

  setLoading(false);
}

// Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}

startCamera();
</script>
</body>
</html>
